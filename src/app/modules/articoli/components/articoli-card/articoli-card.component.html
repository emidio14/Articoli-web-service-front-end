<div class="col">
    <div class="card card-product-grid">
        <a href="#" class="img-wrap"> <img
                src="assets/images/prodotti/1.jpg"
                class="img-rounded" width="180" height="225"
                alt="Product"> </a>
        <div class="info-wrap">
            <a href="#" class="title text-truncate">{{articolo.descrizione}}
            </a>
            <div class="price mb-2">{{articolo.prezzo | currency: 'EUR'}}</div>
            <!-- price.// -->
            <button class="btn btn-sm btn-light" (click)="editArt()">
                <i class="material-icons md-edit"></i>Modifica
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="delArt()">
                <i class="material-icons md-delete_forever"></i>Elimina
            </button>
        </div>
    </div> <!-- card-product  end// -->
</div> <!-- col.// -->
